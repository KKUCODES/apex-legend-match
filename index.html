<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color"content="#0a0a15">
<meta name="apple-mobile-web-app-capable"content="yes">
<meta name="apple-mobile-web-app-status-bar-style"content="black-translucent">
<meta name="description"content="APEX - 测试你的 Apex 英雄人格">
<meta name="viewport"content="width=device-width, initial-scale=1.0">
<title>APEX — 测试你的传奇人格</title>

<script data-goatcounter="https://apex-legend-match.goatcounter.com/count"async src="https://gc.zgo.at/count.js"></script>
<script src="vendor/tailwind.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontDisplay: 'swap',
      fontFamily: {
        sans: ['"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
      },
      animation: {
        'float': 'float 3s ease-in-out infinite',
        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
        'fade-in': 'fadeIn .5s ease-out both',
        'slide-up': 'slideUp .5s ease-out both',
        'scanline': 'scanline 3s linear infinite',
        'hud-flicker': 'hudFlicker 4s ease-in-out infinite',
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0)'},
          '50%': { transform: 'translateY(-6px)'},
        },
        fadeIn: {
          from: { opacity: '0', transform: 'translateY(12px)'},
          to: { opacity: '1', transform: 'translateY(0)'},
        },
        slideUp: {
          from: { opacity: '0', transform: 'translateY(24px)'},
          to: { opacity: '1', transform: 'translateY(0)'},
        },
        pulseGlow: {
          '0%, 100%': { boxShadow: '0 0 12px rgba(218,41,42,.3)'},
          '50%': { boxShadow: '0 0 28px rgba(218,41,42,.6)'},
        },
        scanline: {
          '0%': { top: '-10%'},
          '100%': { top: '110%'},
        },
        hudFlicker: {
          '0%, 100%': { opacity: '1'},
          '92%': { opacity: '1'},
          '93%': { opacity: '.7'},
          '94%': { opacity: '1'},
          '96%': { opacity: '.8'},
          '97%': { opacity: '1'},
        },
      }
    }
  },
}
</script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 粒子背景 -->
<div class="particle-bg"id="particles"></div>

<!-- ==================== 主容器 ==================== -->
<div id="app">

  <!-- ====== 欢迎页 ====== -->
  <div class="screen"id="screen-welcome">
    <section class="hud-shell welcome-hud">

      <!-- Apex 标志 -->
      <div class="apex-emblem"aria-hidden="true">
        <img class="apex-emblem-img"src="assets/apex-emblem.webp"alt="">
      </div>
      <div class="hud-divider"aria-hidden="true"><span class="hud-notch"></span></div>
      <p class="apex-subtitle">测试你的传奇人格</p>

      <!-- 信息条 -->
      <div class="intel-strip">
        <div class="intel-chip"><span class="chip-icon">+</span><span>30题</span></div>
        <div class="intel-chip"><span class="chip-icon">◷</span><span>约5分钟</span></div>
        <div class="intel-chip"><span class="chip-icon">●●</span><span>28位传奇</span></div>
      </div>

      <!-- 按钮 -->
      <button class="hud-action"data-action="start-quiz">
        进入赛场
      </button>
      <p class="welcome-footnote">开始测试，匹配最适合你的传奇战术人格</p>
    </section>
  </div>

  <!-- ====== 答题页 ====== -->
  <div class="screen hidden"id="screen-quiz">
    <section class="hud-shell quiz-hud">

      <!-- 进度条 + 菱形标记 -->
      <div>
        <div class="progress-head">
          <span id="qLabel">第 1 / 30 题</span>
          <span id="qPercent">0%</span>
        </div>
        <div class="progress-track">
          <progress value="0"max="30"id="progressFill"></progress>
          <div id="diamondWrapper"style="left: 0%;">
            <div class="diamond-marker"></div>
          </div>
        </div>
      </div>

      <!-- 题目 -->
      <div>
        <p class="question-text"id="questionText"></p>
        <div class="option-stack"id="optionsContainer"></div>
      </div>

      <!-- 下一题按钮 -->
      <div class="quiz-foot">
        <!-- <div class="shortcut-hint">快捷键：A/B/C/D 或 1-4 选择 · Enter / 空格 进入下一题</div> -->
        <button class="hud-action hud-action--compact is-disabled"id="nextBtn"data-action="next-question">
          下一题 →
        </button>
      </div>
    </section>
  </div>

  <!-- ====== 结果页 ====== -->
  <div class="screen hidden"id="screen-result">
    <div id="resultContent"></div>
  </div>

</div>

<!-- Toast -->
<div>
  <div id="toast"class="hidden fixed bottom-6 left-1/2 z-50 px-6 py-3 text-sm toast-slide">
    已复制到剪贴板
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
