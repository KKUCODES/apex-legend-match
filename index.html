<style>
  /* 粒子背景 */
  .particle-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle-bg .dot { position:absolute; border-radius:50%; animation:particleFloat linear infinite; opacity:0; }
  @keyframes particleFloat {
    0% { transform:translateY(105vh) scale(0) rotate(0deg); opacity:0; }
    15% { opacity:.6; }
    85% { opacity:.1; }
    100% { transform:translateY(-5vh) scale(1.4) rotate(180deg); opacity:0; }
  }

  /* HUD 角标装饰 */
  .hud-card { position: relative; }
  .hud-card::before, .hud-card::after {
    content:''; position:absolute; width:16px; height:16px; pointer-events:none;
  }
  .hud-card::before {
    top:-1px; left:-1px;
    border-top: 2px solid #DA292A; border-left: 2px solid #DA292A;
  }
  .hud-card::after {
    bottom:-1px; right:-1px;
    border-bottom: 2px solid #DA292A; border-right: 2px solid #DA292A;
  }

  /* 扫描线 */
  .scanline-overlay {
    position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:50%;
  }
  .scanline-overlay::after {
    content:''; position:absolute; left:0; width:100%; height:3px;
    background:linear-gradient(90deg, transparent, rgba(218,41,42,.4), transparent);
    animation: scanline 3s linear infinite;
  }

  /* 选择卡片动画 */
  .option-card { transition:all .22s cubic-bezier(.4,0,.2,1); }
  .option-card:hover { transform:translateX(6px); border-color: #DA292A !important; }
  .option-card:active { transform:scale(.98); }

  /* 进度条菱形标记 */
  .diamond-marker {
    width: 12px; height: 12px;
    background: #DA292A;
    transform: rotate(45deg) translateY(-16px);
    box-shadow: 0 0 8px rgba(218,41,42,.5);
  }

  /* Canvas 锐利渲染 */
  canvas { image-rendering: auto; }

  /* 滚动条 */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(218,41,42,.2); border-radius:3px; }

  /* ═══════════════════════════════════════════ */
  /*  响应式 — 手机端适配                       */
  /* ═══════════════════════════════════════════ */
  @media (max-width: 640px) {
    .container { padding: 8px; padding-top: 16px; align-items: flex-start; }
    .question-text { font-size: 1.05em; line-height: 1.55; }
    .option-card { padding: 14px 12px !important; gap: 8px !important; }
    .option-card span:first-child { width: 28px !important; height: 28px !important; font-size: 0.75em !important; }
    .progress-wrap { margin-bottom: 16px; }
    .progress-text { font-size: 0.72em; }
    .dim-label { width: 3.5rem !important; font-size: 0.7em !important; }
    .btn { padding: 10px 20px !important; font-size: 0.85em !important; }
    .neighbor-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .neighbor-grid img { width: 56px !important; height: 56px !important; }
  }
  @media (max-width: 380px) {
    .question-text { font-size: 0.95em; }
    .option-card { padding: 12px 10px !important; font-size: 0.88em !important; }
  }
  @media (hover: none) and (pointer: coarse) {
    .option-card:hover { transform: none !important; }
    .option-card:active { background: rgba(218,41,42,.1); }
    .btn:hover { transform: none !important; }
  }
</style>
</head>

      <div class="flex justify-end mt-4">
        <button class="btn btn-primary btn-sm px-8 opacity-50 pointer-events-none transition-all" id="nextBtn" onclick="nextQuestion()">
          下一题 →
        </button>
      </div>
    </div>
  </div>

  <!-- ====== 结果页 ====== -->
  <div class="screen hidden w-full max-w-xl mx-auto" id="screen-result">
    <div class="space-y-4" id="resultContent"></div>
    <div class="flex flex-col sm:flex-row gap-3 justify-center mt-6">
      <button class="btn btn-primary btn-sm px-8" onclick="restartQuiz()">重新检测</button>
      <button class="btn btn-outline btn-sm px-8 border-primary/30 text-primary hover:bg-primary hover:text-white" onclick="shareResult()">分享档案</button>
    </div>
    <p class="text-center text-[10px] text-base-content/20 mt-4">APEX TI · 人格分析系统 · 外域边境</p>
  </div>

</div>

<!-- Toast -->

// ============================================================
//  STATE
// ============================================================
let scores = [0,0,0,0,0];
let currentQ = 0;
let selectedIdx = -1;
let results = null;

// ============================================================
//  SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-' + name).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  QUIZ FLOW
// ============================================================
function startQuiz() {
  currentQ = 0;
  selectedIdx = -1;
  scores = [0,0,0,0,0];
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('qLabel').textContent = `第 ${currentQ + 1} / 30 题`;
  const pct = Math.round((currentQ / 30) * 100);
  document.getElementById('qPercent').textContent = pct + '%';
  document.getElementById('progressFill').value = currentQ;
  document.getElementById('diamondWrapper').style.left = pct + '%';

  const container = document.getElementById('optionsContainer');
  const labels = ['A', 'B', 'C', 'D'];
  container.innerHTML = q.opts.map((opt, i) => `
    <div class="option-card flex items-center gap-3 p-4 rounded-xl border border-base-300/40 bg-base-200/50 cursor-pointer hover:bg-base-200"
         data-idx="${i}" onclick="selectOption(${i})">
      <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded text-xs font-bold bg-base-300/60 text-base-content/60">${labels[i]}</span>
      <span class="text-sm md:text-base text-base-content/80 leading-relaxed">${opt[0]}</span>
    </div>
  `).join('');

  selectedIdx = -1;
  const btn = document.getElementById('nextBtn');
  btn.classList.add('opacity-50', 'pointer-events-none');
  if (currentQ === 29) btn.textContent = '查看结果 →';
  else btn.textContent = '下一题 →';
}

function selectOption(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.option-card').forEach((c, i) => {
    c.classList.toggle('border-primary', i === idx);
    c.classList.toggle('bg-primary/10', i === idx);
    c.classList.toggle('border-base-300/40', i !== idx);
    c.classList.toggle('bg-base-200/50', i !== idx);
  });
  const btn = document.getElementById('nextBtn');
  btn.classList.remove('opacity-50', 'pointer-events-none');
}

function nextQuestion() {
  if (selectedIdx < 0) return;
  const dims = QUESTIONS[currentQ].opts[selectedIdx][1];
  for (let i = 0; i < 5; i++) scores[i] += dims[i];
  if (currentQ < 29) { currentQ++; renderQuestion(); }
  else { normalizeAndCompute(); showScreen('result'); renderResult(); }
}

// ============================================================
//  COMPUTATION
// ============================================================
function normalizeAndCompute() {
  let normalized = scores.map(s => {
    const n = 1 + (s / 30) * 9;
    return Math.max(1, Math.min(10, Math.round(n * 10) / 10));
  });
  computeResults(normalized);
}

function euclideanDist(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i++) sum += (a[i] - b[i]) ** 2;
  return Math.sqrt(sum);
}

function computeResults(userDims) {
  const matches = LEGENDS.map(p => ({
    legend: p, dist: euclideanDist(userDims, p.slice(4))
  }));
  matches.sort((a, b) => a.dist - b.dist);
  results = { top: matches[0], userDims, all: matches };
}

// ============================================================
//  RADAR CHART
// ============================================================
function drawRadar(userDims, legendDims, labels, legendColor) {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) / 2 - 40;
  const n = 5;

  ctx.clearRect(0, 0, W, H);

  // Grid rings
  for (let ring = 2; ring <= 10; ring += 2) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      const r = (ring / 10) * R;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(212,212,224,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(212,212,224,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Legend polygon
  drawPoly(ctx, cx, cy, R, legendDims, legendColor + '40', legendColor, n);
  // User polygon
  drawPoly(ctx, cx, cy, R, userDims, 'rgba(255,180,0,0.15)', '#FFB400', n);

  // Labels
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const lr = R + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const shortLabel = labels[i].replace(/^[^\s]+\s/, '');
    ctx.fillStyle = 'rgba(212,212,224,0.5)';
    ctx.fillText(shortLabel, lx, ly + 4);
  }
}

function drawPoly(ctx, cx, cy, R, dims, fill, stroke, n) {
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    const r = (dims[idx] / 10) * R;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function generateDescription(legend, dist, userDims, legendDims) {
  const name = legend[1];
  const en = legend[2];
  const id = legend[0];
  const dimKeys = ['侵略','智略','机动','协作','韧性'];

  const matchPct = parseFloat(((1 - dist / 20.1) * 100).toFixed(1));

  // 找到用户与角色差异最大的维度
  const diffs = userDims.map((u, i) => ({ i, diff: Math.abs(u - legendDims[i]) }));
  diffs.sort((a, b) => b.diff - a.diff);
  const maxDiff = diffs[0].diff;
  const maxDiffIdx = diffs[0].i;

  // 找到用户最突出的维度
  const userTop = [...Array(5)].map((_, i) => i).sort((a, b) => userDims[b] - userDims[a])[0];

  const profile = LEGEND_PROFILES[id];

  // 匹配度句
  let matchLine = '';
  if (matchPct >= 85) matchLine = `你与${name}（${en}）的灵魂几乎同频——`;
  else if (matchPct >= 70) matchLine = `你在${name}（${en}）身上看到了自己的影子——`;
  else matchLine = `你和${name}（${en}）有着微妙的共鸣——`;

  // 差异句
  let diffLine = '';
  if (maxDiff < 1) {
    diffLine = `你们的五维图谱几乎完美重合，仿佛战场上的一面镜子。`;
  } else {
    const diffDimName = dimKeys[maxDiffIdx];
    const userVal = userDims[maxDiffIdx];
    const legendVal = legendDims[maxDiffIdx];
    if (userVal > legendVal) {
      diffLine = `不过你在「${diffDimName}」上比${name}更加突出，这让你成为了一个更极致的版本。`;
    } else {
      diffLine = `不过你在「${diffDimName}」上比${name}稍弱一些——但这也意味着你有更大的成长空间。`;
    }
  }

  return matchLine + profile.core + ' ' + diffLine;
}

// ============================================================
function shareResult() {
  if (!results) return;
  const p = results.top.legend;
  const simPct = (Math.max(0, (1 - results.top.dist / 20.1) * 100)).toFixed(1);
  const dimNames = ['⚔️ 侵略','🧠 智略','🚀 机动','🤝 协作','🛡️ 韧性'];
  const text = `🎮 APEX TI 🎮\n\n✨ 我的传奇人格：${p[1]}（${p[2]}）\n🎯 匹配度：${simPct}%\n📊 五维数据：\n${dimNames.map((d, i) => `  ${d}: ${Math.round(results.userDims[i] * 10) / 10}/10`).join('\n')}\n\n😎 你也来测测你的传奇人格！`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2000);
}

function restartQuiz() {
  results = null;
  showScreen('welcome');
}

//  KEYBOARD SUPPORT
// ============================================================
document.addEventListener('keydown', (e) => {
  const quiz = document.getElementById('screen-quiz');
  if (quiz.classList.contains('hidden')) return;

  if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key) - 1);
  if (e.key.toLowerCase() === 'a') selectOption(0);
  if (e.key.toLowerCase() === 'b') selectOption(1);
  if (e.key.toLowerCase() === 'c') selectOption(2);
  if (e.key.toLowerCase() === 'd') selectOption(3);
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nextQuestion(); }
});
