<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color"content="#0a0a15">
<meta name="apple-mobile-web-app-capable"content="yes">
<meta name="apple-mobile-web-app-status-bar-style"content="black-translucent">
<meta name="description"content="APEX - 测试你的 Apex 英雄人格">
<meta name="viewport"content="width=device-width, initial-scale=1.0">
<title>APEX — 测试你的传奇人格</title>

<script data-goatcounter="https://apex-legend-match.goatcounter.com/count"async src="https://gc.zgo.at/count.js"></script>
<script src="vendor/tailwind.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontDisplay: 'swap',
      fontFamily: {
        sans: ['"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
      },
      animation: {
        'float': 'float 3s ease-in-out infinite',
        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
        'fade-in': 'fadeIn .5s ease-out both',
        'slide-up': 'slideUp .5s ease-out both',
        'scanline': 'scanline 3s linear infinite',
        'hud-flicker': 'hudFlicker 4s ease-in-out infinite',
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0)'},
          '50%': { transform: 'translateY(-6px)'},
        },
        fadeIn: {
          from: { opacity: '0', transform: 'translateY(12px)'},
          to: { opacity: '1', transform: 'translateY(0)'},
        },
        slideUp: {
          from: { opacity: '0', transform: 'translateY(24px)'},
          to: { opacity: '1', transform: 'translateY(0)'},
        },
        pulseGlow: {
          '0%, 100%': { boxShadow: '0 0 12px rgba(218,41,42,.3)'},
          '50%': { boxShadow: '0 0 28px rgba(218,41,42,.6)'},
        },
        scanline: {
          '0%': { top: '-10%'},
          '100%': { top: '110%'},
        },
        hudFlicker: {
          '0%, 100%': { opacity: '1'},
          '92%': { opacity: '1'},
          '93%': { opacity: '.7'},
          '94%': { opacity: '1'},
          '96%': { opacity: '.8'},
          '97%': { opacity: '1'},
        },
      }
    }
  },
}
</script>

<style>
  :root {
    --apex-red: #ff2b22;
    --apex-red-deep: #7f0709;
    --apex-orange: #ff7a21;
    --apex-gold: #ffd47b;
    --apex-cyan: #00e2d1;
    --apex-lime: #9ad643;
    --hud-ink: #05070d;
    --hud-panel: #0a0e15;
    --hud-panel-soft: rgba(14, 20, 29, .82);
    --hud-line: rgba(255, 51, 38, .78);
    --hud-line-soft: rgba(255, 72, 44, .28);
    --hud-text: #f0e5d2;
    --hud-muted: rgba(223, 211, 194, .58);
    --hud-faint: rgba(223, 211, 194, .28);
    --hud-shadow: 0 0 52px rgba(255, 35, 26, .2), inset 0 0 70px rgba(255, 43, 34, .05);
  }

  * { box-sizing: border-box; }

  html {
    min-height: 100%;
    background: var(--hud-ink);
  }

  body {
    min-height: 100dvh;
    margin: 0;
    color: var(--hud-text);
    font-family: "DIN Alternate", "Arial Narrow", "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    letter-spacing: 0;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 50% 34%, rgba(132, 17, 24, .28), transparent 34rem),
      radial-gradient(circle at 72% 18%, rgba(255, 103, 20, .12), transparent 25rem),
      radial-gradient(circle at 12% 80%, rgba(255, 43, 34, .13), transparent 22rem),
      linear-gradient(155deg, #02030a 0%, #080914 42%, #11070d 100%);
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  body::before {
    z-index: 0;
    opacity: .44;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, transparent 0 42px, rgba(255, 42, 34, .055) 42px 43px, transparent 43px 96px);
    mix-blend-mode: screen;
  }

  body::after {
    z-index: 0;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, .58) 100%),
      linear-gradient(90deg, rgba(0,0,0,.64), transparent 12%, transparent 88%, rgba(0,0,0,.64));
  }

  /* 粒子背景 */
  .particle-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle-bg .dot {
    position: absolute;
    width: 2px;
    height: 18px;
    border-radius: 999px;
    animation: particleFloat linear infinite;
    opacity: 0;
    box-shadow: 0 0 12px currentColor;
    transform-origin: center;
  }

  @keyframes particleFloat {
    0% { transform: translate3d(0, 108vh, 0) rotate(38deg) scale(.4); opacity: 0; }
    16% { opacity: .9; }
    86% { opacity: .16; }
    100% { transform: translate3d(38px, -10vh, 0) rotate(38deg) scale(1.2); opacity: 0; }
  }

  @keyframes hudReveal {
    from { opacity: 0; transform: translateY(18px) scale(.985); filter: blur(4px); }
    to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @keyframes scanline {
    0% { transform: translateY(-120%); }
    100% { transform: translateY(120%); }
  }

  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(255, 43, 34, .42)); }
    50% { filter: drop-shadow(0 0 34px rgba(255, 160, 42, .62)); }
  }

  @keyframes textHeat {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes ringSpin {
    to { transform: rotate(360deg); }
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 14px;
  }

  .screen {
    --concept-art: none;
    position: relative;
    width: min(941px, 100%);
    margin: 0 auto;
    animation: hudReveal .45s cubic-bezier(.16, 1, .3, 1) both;
  }

  .screen::before {
    content: "";
    display: none;
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background-image: var(--concept-art);
    background-size: 100% 100%;
    background-position: center;
    opacity: .055;
    mix-blend-mode: screen;
    filter: saturate(1.15) contrast(1.12);
  }

  #screen-welcome,
  #screen-quiz,
  #screen-result { --concept-art: none; }

  .hud-shell {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    min-height: calc(100dvh - 28px);
    padding: 58px 66px;
    background:
      linear-gradient(180deg, rgba(255, 43, 34, .1), transparent 18%, transparent 76%, rgba(255, 43, 34, .09)),
      radial-gradient(circle at 50% 18%, rgba(255, 43, 34, .09), transparent 23rem),
      linear-gradient(180deg, rgba(12, 17, 26, .96), rgba(6, 8, 14, .97));
    border: 1px solid transparent;
    clip-path: polygon(5.4% 0, 28% 0, 30% 10px, 70% 10px, 72% 0, 94.6% 0, 100% 5.1%, 100% 34%, 98.7% 35.2%, 98.7% 64.8%, 100% 66%, 100% 94.9%, 94.6% 100%, 72% 100%, 70% calc(100% - 10px), 30% calc(100% - 10px), 28% 100%, 5.4% 100%, 0 94.9%, 0 66%, 1.3% 64.8%, 1.3% 35.2%, 0 34%, 0 5.1%);
    box-shadow: var(--hud-shadow);
  }

  .hud-shell::before {
    content: "";
    position: absolute;
    inset: 12px;
    z-index: -1;
    border: 1px solid rgba(255, 58, 42, .38);
    clip-path: polygon(5.5% 0, 22% 0, 24% 12px, 76% 12px, 78% 0, 94.5% 0, 100% 5%, 100% 95%, 94.5% 100%, 78% 100%, 76% calc(100% - 12px), 24% calc(100% - 12px), 22% 100%, 5.5% 100%, 0 95%, 0 5%);
    box-shadow:
      inset 0 0 0 1px rgba(255, 161, 73, .08),
      inset 0 0 34px rgba(255, 43, 34, .13),
      0 0 18px rgba(255, 43, 34, .2);
  }

  .hud-shell::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    opacity: .62;
    background:
      linear-gradient(90deg, transparent 8%, rgba(255, 43, 34, .45) 8.2%, transparent 8.8%, transparent 91.2%, rgba(255, 43, 34, .45) 91.8%, transparent 92.2%) 0 78px / 100% 1px no-repeat,
      linear-gradient(90deg, transparent 17%, rgba(255, 43, 34, .3) 17.4%, transparent 29%, transparent 71%, rgba(255, 43, 34, .22) 83%, transparent 83.4%) 0 calc(100% - 78px) / 100% 1px no-repeat,
      radial-gradient(circle at 8% 10%, rgba(255, 43, 34, .18), transparent 9rem),
      radial-gradient(circle at 94% 91%, rgba(255, 111, 32, .2), transparent 9rem),
      repeating-linear-gradient(135deg, transparent 0 18px, rgba(255, 255, 255, .026) 18px 19px);
  }

  .hud-kicker {
    color: var(--hud-muted);
    font-size: .82rem;
    letter-spacing: .36em;
    text-transform: uppercase;
  }

  .hud-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--hud-faint);
  }

  .hud-divider::before,
  .hud-divider::after {
    content: "";
    width: 134px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 43, 34, .74), transparent);
  }

  .hud-notch {
    width: 18px;
    height: 18px;
    border: 2px solid var(--apex-red);
    transform: rotate(45deg);
    box-shadow: 0 0 15px rgba(255, 43, 34, .55);
  }

  .welcome-hud {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding-top: 74px;
    padding-bottom: 76px;
  }

  .apex-emblem {
    position: relative;
    width: 210px;
    height: 152px;
    margin: 0 auto 34px;
    animation: logoPulse 3.4s ease-in-out infinite;
  }

  .apex-emblem::before,
  .apex-emblem::after {
    content: "";
    position: absolute;
    display: block;
  }

  .apex-emblem::before {
    inset: 16px 2px;
    background: radial-gradient(circle, rgba(255, 91, 31, .54), transparent 68%);
    filter: blur(18px);
  }

  .apex-emblem::after {
    inset: 0;
    background: linear-gradient(180deg, #ff251e 0%, #ff4b25 48%, #ffd36b 100%);
    filter: drop-shadow(0 0 18px rgba(255, 43, 34, .58)) drop-shadow(0 0 28px rgba(255, 157, 48, .28));
    -webkit-mask: url("assets/apex-emblem.webp") left center / auto 100% no-repeat;
    mask: url("assets/apex-emblem.webp") left center / auto 100% no-repeat;
  }

  .apex-emblem-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left center;
    pointer-events: none;
    user-select: none;
    filter: invert(1);
  }

  .apex-title {
    margin: 0;
    font-size: 8.2rem;
    line-height: .82;
    font-weight: 950;
    letter-spacing: .035em;
    background: linear-gradient(100deg, #d61218 0%, #f04a22 48%, #ffd53f 100%);
    background-size: 180% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(255, 43, 34, .16);
    animation: textHeat 8s ease-in-out infinite;
  }

  .apex-subtitle {
    margin: 30px 0 38px;
    color: rgba(231, 222, 211, .78);
    font-size: 2.05rem;
    font-weight: 800;
    letter-spacing: .42em;
  }

  .intel-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin: 0 auto 60px;
    max-width: 720px;
  }

  .intel-chip {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    min-height: 74px;
    color: rgba(239, 225, 208, .82);
    font-size: 1.35rem;
    font-weight: 800;
    background: linear-gradient(180deg, rgba(22, 21, 25, .9), rgba(9, 12, 18, .9));
    border: 1px solid rgba(255, 44, 34, .46);
    clip-path: polygon(12% 0, 88% 0, 100% 28%, 100% 72%, 88% 100%, 12% 100%, 0 72%, 0 28%);
    box-shadow: inset 0 0 26px rgba(255, 43, 34, .06), 0 0 18px rgba(255, 43, 34, .1);
  }

  .chip-icon {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    color: var(--apex-red);
    border: 2px solid rgba(255, 43, 34, .78);
    border-radius: 50%;
    font-size: .9rem;
    line-height: 1;
    box-shadow: 0 0 12px rgba(255, 43, 34, .24);
  }

  .hud-action {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 92px;
    min-width: 520px;
    padding: 0 54px;
    border: 1px solid rgba(255, 120, 37, .9);
    color: #fff1b2;
    background:
      linear-gradient(180deg, rgba(255, 80, 31, .36), rgba(123, 8, 9, .96)),
      repeating-linear-gradient(135deg, rgba(255,255,255,.07) 0 1px, transparent 1px 9px);
    clip-path: polygon(7% 0, 93% 0, 100% 26%, 100% 74%, 93% 100%, 7% 100%, 0 74%, 0 26%);
    box-shadow:
      0 0 28px rgba(255, 43, 34, .38),
      inset 0 0 0 2px rgba(255, 217, 134, .08),
      inset 0 0 42px rgba(255, 43, 34, .2);
    font-size: 2.8rem;
    font-weight: 950;
    letter-spacing: .28em;
    text-decoration: none;
    text-shadow: 0 0 18px rgba(255, 225, 150, .56);
    cursor: pointer;
    transition: transform .26s cubic-bezier(.16, 1, .3, 1), filter .26s ease, opacity .2s ease;
  }

  .hud-action::before,
  .hud-action::after {
    content: "";
    position: absolute;
    inset: 8px 14px;
    pointer-events: none;
    border-top: 1px solid rgba(255, 226, 140, .48);
    border-bottom: 1px solid rgba(255, 43, 34, .48);
    clip-path: polygon(6% 0, 94% 0, 100% 30%, 100% 70%, 94% 100%, 6% 100%, 0 70%, 0 30%);
  }

  .hud-action::after {
    inset: auto 28px 8px;
    height: 7px;
    border: 0;
    background: repeating-linear-gradient(90deg, rgba(255, 43, 34, .88) 0 8px, transparent 8px 13px);
    opacity: .75;
  }

  .hud-action:hover {
    transform: translateY(-3px);
    filter: brightness(1.14);
  }

  .hud-action:active {
    transform: translateY(1px) scale(.99);
  }

  .hud-action.is-disabled {
    opacity: .45;
    pointer-events: none;
    filter: grayscale(.35);
  }

  .hud-action--compact {
    min-width: 360px;
    min-height: 78px;
    padding: 0 38px;
    font-size: 2rem;
    letter-spacing: .18em;
  }

  .welcome-footnote {
    margin: 48px 0 0;
    color: rgba(219, 211, 201, .52);
    font-size: 1.22rem;
    letter-spacing: .12em;
  }

  .quiz-hud {
    padding: 72px 72px 62px;
  }

  .progress-head {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 20px;
    margin: 0 34px 20px;
    color: var(--hud-muted);
    font-weight: 800;
  }

  #qLabel {
    font-size: 1.6rem;
    letter-spacing: .08em;
  }

  #qLabel::first-letter,
  #qPercent {
    color: var(--apex-red);
  }

  #qLabel strong {
    color: var(--apex-red);
    font-size: 1.28em;
    letter-spacing: .02em;
  }

  #qPercent {
    font-size: 2rem;
    letter-spacing: .04em;
  }

  .progress-track {
    position: relative;
    margin: 0 34px 74px;
    height: 24px;
  }

  #progressFill {
    width: 100%;
    height: 16px;
    appearance: none;
    border: 1px solid rgba(255, 58, 43, .8);
    background: rgba(5, 8, 13, .88);
    clip-path: polygon(1.5% 0, 98.5% 0, 100% 50%, 98.5% 100%, 1.5% 100%, 0 50%);
    box-shadow: inset 0 0 12px rgba(255, 43, 34, .16), 0 0 16px rgba(255, 43, 34, .12);
  }

  #progressFill::-webkit-progress-bar {
    background: transparent;
  }

  #progressFill::-webkit-progress-value {
    background: linear-gradient(90deg, #f51f1c 0%, #ff4b22 58%, #ffb13b 100%);
    box-shadow: 0 0 18px rgba(255, 75, 34, .45);
  }

  #progressFill::-moz-progress-bar {
    background: linear-gradient(90deg, #f51f1c 0%, #ff4b22 58%, #ffb13b 100%);
    box-shadow: 0 0 18px rgba(255, 75, 34, .45);
  }

  #diamondWrapper {
    position: absolute;
    top: -11px;
    transition: left .45s cubic-bezier(.16, 1, .3, 1);
  }

  .diamond-marker {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, #ff1320, #ff6d28);
    border: 3px solid #ffd1a0;
    transform: translateX(-50%) rotate(45deg);
    box-shadow: 0 0 20px rgba(255, 43, 34, .82), inset 0 0 12px rgba(0, 0, 0, .34);
  }

  .question-text {
    margin: 0 28px 54px;
    color: #f5ead9;
    font-size: 2.55rem;
    line-height: 1.48;
    font-weight: 950;
    letter-spacing: .04em;
    text-shadow: 0 0 18px rgba(255, 238, 210, .08);
  }

  .option-stack {
    display: grid;
    gap: 24px;
  }

  .option-card {
    position: relative;
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: center;
    gap: 24px;
    width: 100%;
    min-height: 112px;
    padding: 20px 36px 20px 28px;
    border: 1px solid rgba(255, 77, 43, .45);
    color: var(--hud-text);
    text-align: left;
    font: inherit;
    background:
      linear-gradient(90deg, rgba(18, 20, 24, .94), rgba(10, 12, 18, .88) 64%, rgba(42, 9, 9, .76)),
      repeating-linear-gradient(135deg, rgba(255,255,255,.035) 0 1px, transparent 1px 12px);
    clip-path: polygon(5% 0, 96% 0, 100% 28%, 100% 72%, 96% 100%, 5% 100%, 0 72%, 0 28%);
    cursor: pointer;
    box-shadow: inset 0 0 30px rgba(255, 43, 34, .035);
    transition: transform .24s cubic-bezier(.16, 1, .3, 1), border-color .24s ease, box-shadow .24s ease, background .24s ease;
  }

  .option-card::before {
    content: "";
    position: absolute;
    inset: 7px;
    border-top: 1px solid rgba(255, 43, 34, .45);
    border-bottom: 1px solid rgba(255, 132, 52, .25);
    pointer-events: none;
    clip-path: polygon(5% 0, 96% 0, 100% 28%, 100% 72%, 96% 100%, 5% 100%, 0 72%, 0 28%);
  }

  .option-card:hover {
    transform: translateX(7px);
    border-color: rgba(255, 142, 52, .96);
    box-shadow: 0 0 28px rgba(255, 43, 34, .18), inset 0 0 42px rgba(255, 43, 34, .08);
  }

  .option-card:active {
    transform: translateX(4px) scale(.992);
  }

  .option-card.is-selected {
    border-color: rgba(255, 181, 87, .95);
    background:
      linear-gradient(90deg, rgba(126, 9, 10, .96), rgba(95, 12, 13, .9) 58%, rgba(26, 8, 10, .9)),
      repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 1px, transparent 1px 10px);
    box-shadow: 0 0 34px rgba(255, 43, 34, .34), inset 0 0 48px rgba(255, 57, 30, .16);
  }

  .option-key {
    position: relative;
    display: grid;
    place-items: center;
    width: 72px;
    height: 72px;
    color: var(--apex-red);
    font-size: 2.6rem;
    font-weight: 950;
    border: 1px solid rgba(255, 75, 42, .65);
    clip-path: polygon(22% 0, 78% 0, 100% 22%, 100% 78%, 78% 100%, 22% 100%, 0 78%, 0 22%);
    background: rgba(8, 10, 15, .8);
    box-shadow: inset 0 0 20px rgba(255, 43, 34, .08);
  }

  .option-card.is-selected .option-key {
    color: #ff5c32;
    text-shadow: 0 0 14px rgba(255, 43, 34, .48);
    border-color: rgba(255, 177, 89, .9);
  }

  .option-copy {
    color: rgba(243, 232, 216, .9);
    font-size: 1.42rem;
    line-height: 1.55;
    font-weight: 800;
    letter-spacing: .04em;
  }

  .quiz-foot {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
    margin-top: 38px;
  }

  .result-hud {
    min-height: auto;
    padding: 28px 40px 32px;
  }

  .result-topbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 22px;
    margin-bottom: 18px;
  }

  .result-title {
    text-align: center;
  }

  .result-title strong {
    display: block;
    color: var(--apex-gold);
    font-size: 3.18rem;
    line-height: 1;
    font-weight: 950;
    letter-spacing: .24em;
    text-shadow: 0 0 18px rgba(255, 157, 42, .35);
  }

  .result-title span {
    display: block;
    margin-top: 9px;
    color: rgba(255, 127, 43, .6);
    font-size: .82rem;
    letter-spacing: .48em;
  }

  .icon-button,
  .history-button {
    min-height: 48px;
    border: 1px solid rgba(255, 43, 34, .46);
    color: rgba(255, 82, 52, .9);
    background: rgba(9, 11, 17, .72);
    clip-path: polygon(14% 0, 86% 0, 100% 24%, 100% 76%, 86% 100%, 14% 100%, 0 76%, 0 24%);
    cursor: pointer;
    transition: transform .22s cubic-bezier(.16, 1, .3, 1), border-color .22s ease, color .22s ease;
  }

  .icon-button {
    width: 64px;
    font-size: 2rem;
  }

  .history-button {
    padding: 0 20px;
    font-size: .9rem;

          下一题 →

      </div>
    </section>
  </div>

  <!-- ====== 结果页 ====== -->

    <div id="resultContent"></div>

</div>

// ============================================================
//  STATE
// ============================================================
let scores = [0,0,0,0,0];
let currentQ = 0;
let selectedIdx = -1;
let results = null;

// ============================================================
//  SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-'+ name).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth'});
}

// ============================================================
//  QUIZ FLOW
// ============================================================
function startQuiz() {
  currentQ = 0;
  selectedIdx = -1;
  scores = [0,0,0,0,0];
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('qLabel').innerHTML = `第 <strong>${currentQ + 1}</strong> / 30 题`;
  const pct = Math.round(((currentQ + 1) / 30) * 100);
  document.getElementById('qPercent').textContent = pct + '%';
  document.getElementById('progressFill').value = currentQ + 1;
  document.getElementById('diamondWrapper').style.left = pct + '%';

  const container = document.getElementById('optionsContainer');
  const labels = ['A', 'B', 'C', 'D'];
  container.innerHTML = q.opts.map((opt, i) => `
    <button class="option-card"type="button"data-idx="${i}"onclick="selectOption(${i})"aria-pressed="false">
      <span class="option-key">${labels[i]}</span>
      <span class="option-copy">${opt[0]}</span>
    </button>
  `).join('');

  selectedIdx = -1;
  const btn = document.getElementById('nextBtn');
  btn.classList.add('is-disabled');
  if (currentQ === 29) btn.textContent = '查看结果 →';
  else btn.textContent = '下一题 →';
}

function selectOption(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.option-card').forEach((c, i) => {
    c.classList.toggle('is-selected', i === idx);
    c.setAttribute('aria-pressed', i === idx ? 'true': 'false');
  });
  const btn = document.getElementById('nextBtn');
  btn.classList.remove('is-disabled');
}

function nextQuestion() {
  if (selectedIdx < 0) return;
  const dims = QUESTIONS[currentQ].opts[selectedIdx][1];
  for (let i = 0; i < 5; i++) scores[i] += dims[i];
  if (currentQ < 29) { currentQ++; renderQuestion(); }
  else { normalizeAndCompute(); showScreen('result'); renderResult(); }
}

// ============================================================
//  COMPUTATION
// ============================================================
function normalizeAndCompute() {
  let normalized = scores.map(s => {
    const n = 1 + (s / 30) * 9;
    return Math.max(1, Math.min(10, Math.round(n * 10) / 10));
  });
  computeResults(normalized);
}

function euclideanDist(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i++) sum += (a[i] - b[i]) ** 2;
  return Math.sqrt(sum);
}

function computeResults(userDims) {
  const matches = LEGENDS.map(p => ({
    legend: p, dist: euclideanDist(userDims, p.slice(4))
  }));
  matches.sort((a, b) => a.dist - b.dist);
  results = { top: matches[0], userDims, all: matches };
}

// ============================================================
//  RESULT RENDERING
// ============================================================
function renderResult() {
  const r = results.top;
  const p = r.legend;
  const dist = r.dist;
  const matchPct = (Math.max(0, (1 - dist / 20.1) * 100)).toFixed(1);
  const classColor = CLASS_COLORS[p[3]] || '#DA292A';
  const dimNames = ['进攻欲','侦察力','控场力','团队协作','应变性'];
  const uv = results.userDims.map(d => Math.round(d * 10) / 10);

// ============================================================
//  RADAR CHART
// ============================================================
function drawRadar(userDims, legendDims, labels, legendColor) {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) / 2 - 54;
  const n = 5;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(6,9,14,0.32)';
  ctx.fillRect(0, 0, W, H);

  // Grid rings
  for (let ring = 2.5; ring <= 10; ring += 2.5) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      const r = (ring / 10) * R;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring === 10 ? 'rgba(255,212,123,0.22)': 'rgba(255,212,123,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = 'rgba(223,211,194,0.34)';
    ctx.font = '10px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(String(Math.round(ring * 10)), cx + 2, cy - (ring / 10) * R + 4);
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(0,226,209,0.16)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Legend polygon
  drawPoly(ctx, cx, cy, R, legendDims, legendColor + '34', legendColor, n);
  // User polygon
  drawPoly(ctx, cx, cy, R, userDims, 'rgba(255,212,123,0.24)', '#FFD47B', n);

  // Labels
  ctx.font = '13px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const lr = R + 32;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    ctx.fillStyle = 'rgba(239,229,210,0.72)';
    ctx.fillText(labels[i], lx, ly + 4);
  }
}

function drawPoly(ctx, cx, cy, R, dims, fill, stroke, n) {
  const points = [];
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
    const r = (dims[idx] / 10) * R;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i < n) points.push([x, y]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.shadowColor = stroke;
  ctx.shadowBlur = 14;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  points.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = stroke;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.62)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

    core: '你不打架。你只是路过。你是 Hammond Robotics 制造的第三代多功能移动机器人，唯一的愿望是修好眼前的设备，然后和路过的传奇击个掌。被打了也不还手——只是默默把胸口显示屏上的笑脸换成哭脸。',
    tag: '只想击掌的善良机器人',
  },
};

function generateDescription(legend, dist, userDims, legendDims) {
  const name = legend[1];
  const en = legend[2];
  const id = legend[0];
  const dimKeys = ['侵略','智略','机动','协作','韧性'];

  const matchPct = parseFloat(((1 - dist / 20.1) * 100).toFixed(1));

  // 找到用户与角色差异最大的维度
  const diffs = userDims.map((u, i) => ({ i, diff: Math.abs(u - legendDims[i]) }));
  diffs.sort((a, b) => b.diff - a.diff);
  const maxDiff = diffs[0].diff;
  const maxDiffIdx = diffs[0].i;

  // 找到用户最突出的维度
  const userTop = [...Array(5)].map((_, i) => i).sort((a, b) => userDims[b] - userDims[a])[0];

  const profile = LEGEND_PROFILES[id];

  // 匹配度句
  let matchLine = '';
  if (matchPct >= 85) matchLine = `你与${name}（${en}）的灵魂几乎同频——`;
  else if (matchPct >= 70) matchLine = `你在${name}（${en}）身上看到了自己的影子——`;
  else matchLine = `你和${name}（${en}）有着微妙的共鸣——`;

  // 差异句
  let diffLine = '';
  if (maxDiff < 1) {
    diffLine = `你们的五维图谱几乎完美重合，仿佛战场上的一面镜子。`;
  } else {
    const diffDimName = dimKeys[maxDiffIdx];
    const userVal = userDims[maxDiffIdx];
    const legendVal = legendDims[maxDiffIdx];
    if (userVal > legendVal) {
      diffLine = `不过你在「${diffDimName}」上比${name}更加突出，这让你成为了一个更极致的版本。`;
    } else {
      diffLine = `不过你在「${diffDimName}」上比${name}稍弱一些——但这也意味着你有更大的成长空间。`;
    }
  }

  return matchLine + profile.core + ''+ diffLine;
}

// ============================================================
//  SHARE & RESTART
// ============================================================
function shareResult() {
  if (!results) return;
  const p = results.top.legend;
  const simPct = (Math.max(0, (1 - results.top.dist / 20.1) * 100)).toFixed(1);
  const shareUrl = window.location.href;
  const text = `APEX\n\n我的传奇人格：${p[1]}（${p[2]}）\n匹配度：${simPct}%\n\n你也来测测你的传奇人格：\n${shareUrl}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2000);
}

function restartQuiz() {
  results = null;
  showScreen('welcome');
}

// ============================================================
//  PARTICLES
// ============================================================
(function initParticles() {
  const container = document.getElementById('particles');
  const colors = ['#FF2B22', '#FF7A21', '#FFD47B', '#B80D11'];
  for (let i = 0; i < 35; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const length = 8 + Math.random() * 28;
    dot.style.width = (1 + Math.random() * 2) + 'px';
    dot.style.height = length + 'px';
    dot.style.left = Math.random() * 100 + '%';
    dot.style.color = color;
    dot.style.background = `linear-gradient(180deg, ${color}, transparent)`;
    dot.style.animationDuration = (12 + Math.random() * 20) + 's';
    dot.style.animationDelay = -(Math.random() * 20) + 's';
    container.appendChild(dot);
  }
})();

// ============================================================
//  KEYBOARD SUPPORT
// ============================================================
document.addEventListener('keydown', (e) => {
  const quiz = document.getElementById('screen-quiz');
  if (quiz.classList.contains('hidden')) return;

  if (e.key >= '1'&& e.key <= '4') selectOption(parseInt(e.key) - 1);
  if (e.key.toLowerCase() === 'a') selectOption(0);
  if (e.key.toLowerCase() === 'b') selectOption(1);
  if (e.key.toLowerCase() === 'c') selectOption(2);
  if (e.key.toLowerCase() === 'd') selectOption(3);
  if (e.key === 'Enter'|| e.key === '') { e.preventDefault(); nextQuestion(); }
});
